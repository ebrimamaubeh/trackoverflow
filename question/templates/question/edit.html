{% load crispy_forms_tags %}

{% block questionSection %}
<form class="needs-validation" method="POST">
	{% csrf_token %}
	<div class="mb-3">
		<label for="title">Title:</label>
		<input type="text" id="title" class="form-control" name="title" value="{{ post.title }}">
		
	</div>
	<div class="mb-3">
		<label for="content">Content:</label>
		<textarea class="form-control" name="content" rows="10"> {{ post.content }} </textarea>
	</div>
	<div class="mb-3">
		<p>{{tags_string}} jallow</p>
		<label for="tags">Tags:</label>
		<input type="text" id="tags" name="tags" value="{{ tags_string }}">
	</div>
	<div class="mb-3">
	  <input type="submit" class="btn btn-primary mb-3" name="submit" value="Update Question">
	</div>
</form>

{% endblock questionSection %}
