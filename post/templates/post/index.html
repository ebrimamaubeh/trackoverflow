<h1>
    showing all posts. (todo, use base pages and inheritence)
</h1>

{% if messages %}
   {% for message in messages %}
      <p style="color:red;"> {{ message }} </p>
   {% endfor %}
{% endif %}
 
<div>
     {% for post in posts %}
         <p> <a href="detail/{{ post.id }}">{{ post.title }}</a> </p>
         
         {% for tag in post.tags.all %}
           <p><a href="#"> {{ tag }}</a></p>
         {% endfor %}         
         
     <hr>
     {% endfor %}
</div>
